<!-- Sección principal de contenido -->

<main class="container mt-4 mb-5">
    <h2 class="mb-4">Crear tu perfil de músico</h2>

    <form class="row g-3 perfil-form">
        <div class="col-md-6">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Ej: Nico">
        </div>

        <div class="col-md-6">
            <label for="instrumento" class="form-label">Instrumento</label>
            <select class="form-select" id="instrumento">
                <option selected disabled>Elegí tu instrumento</option>
                <option>Voz</option>
                <option>Guitarra</option>
                <option>Bajo</option>
                <option>Batería</option>
                <option>Teclado</option>
                <option>Otro</option>
            </select>
        </div>

        <div class="col-md-6">
            <label for="zona" class="form-label">Zona</label>
            <input type="text" class="form-control" id="zona" placeholder="Ej: La Plata">
        </div>

        <div class="col-md-6">
            <label for="buscando" class="form-label">¿Qué estás buscando?</label>
            <input type="text" class="form-control" id="buscando" placeholder="Ej: Guitarrista, Bajista">
        </div>

        <div class="col-12">
            <label for="descripcion" class="form-label">Descripción / Influencias</label>
            <textarea class="form-control" id="descripcion" rows="4" placeholder="Contanos un poco sobre vos, tus influencias, experiencia, etc."></textarea>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-danger">Crear perfil</button>
        </div>
    </form>
</main>
